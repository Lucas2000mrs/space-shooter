<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter Horror Edition</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial, Helvetica, sans-serif;
}

canvas{
    display:block;
    background:radial-gradient(circle at top,#101840,#000);
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:24px;
    z-index:10;
    display:none;
}

#healthBar{
    width:240px;
    height:22px;
    background:#222;
    border-radius:12px;
    overflow:hidden;
    margin-top:10px;
    border:2px solid #555;
}

#health{
    width:100%;
    height:100%;
    background:lime;
}

#levelText{
    margin-top:10px;
    color:cyan;
}

#shipText{
    margin-top:8px;
    color:#00e5ff;
}

#menu,
#gameOver{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

#menu{
    background:radial-gradient(circle at center,#101840,#000);
    z-index:20;
}

#menu h1{
    font-size:70px;
    color:cyan;
    text-shadow:0 0 20px cyan;
    margin-bottom:20px;
}

#menu p{
    font-size:22px;
    margin-bottom:30px;
}

#gameOver{
    background:rgba(0,0,0,0.9);
    display:none;
    z-index:30;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    background:cyan;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div id="menu">
    <h1>SPACE SHOOTER</h1>
    <p>Sobreviva aos aliens monstruosos!</p>
    <button onclick="startGame()">JOGAR</button>
</div>

<div id="hud">
    Pontos: <span id="score">0</span>

    <div id="healthBar">
        <div id="health"></div>
    </div>

    <div id="levelText">
        Nível: <span id="level">1</span>
    </div>

    <div id="shipText">
        Nave MK-I
    </div>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Jogar Novamente</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let score = 0;
let level = 1;
let gameRunning = false;

let maxHealth = 100;
let health = 100;

const scoreText = document.getElementById("score");
const levelText = document.getElementById("level");
const shipText = document.getElementById("shipText");
const healthBar = document.getElementById("health");

const gameOverScreen = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");
const menu = document.getElementById("menu");
const hud = document.getElementById("hud");

const player = {
    x: canvas.width/2,
    y: canvas.height - 120,
    speed: 10,
    weaponLevel:1
};

const bullets = [];
const enemies = [];
const enemyBullets = [];
const medkits = [];
const stars = [];

const keys = {};

let boss = null;

/* ESTRELAS */

for(let i=0;i<250;i++){

    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2+1,
        speed:Math.random()*2+0.5
    });
}

/* CONTROLES */

document.addEventListener("keydown",(e)=>{

    keys[e.key]=true;

    if(e.key===" " && gameRunning){
        shoot();
    }
});

document.addEventListener("keyup",(e)=>{
    keys[e.key]=false;
});

/* START */

function startGame(){

    menu.style.display="none";
    hud.style.display="block";
    gameRunning=true;
}

/* TIRO */

function shoot(){

    let amount = Math.min(player.weaponLevel,6);

    for(let i=0;i<amount;i++){

        bullets.push({

            x:player.x - ((amount-1)*10)/2 + i*10,
            y:player.y,

            w:6,
            h:20,

            speed:14 + player.weaponLevel
        });
    }
}

/* UPGRADE NAVE */

function updateShip(){

    player.weaponLevel = Math.min(level,6);

    const names = [
        "Nave MK-I",
        "Nave MK-II",
        "Nave MK-III",
        "Nave MK-IV",
        "Nave MK-V",
        "Nave MK-VI"
    ];

    shipText.innerText = names[player.weaponLevel-1];
}

/* VIDA */

function updateHealth(){

    healthBar.style.width = health + "%";

    if(health > 60){
        healthBar.style.background = "lime";
    }
    else if(health > 30){
        healthBar.style.background = "yellow";
    }
    else{
        healthBar.style.background = "red";
    }
}

/* SPAWN ENEMY */

function spawnEnemy(){

    if(!gameRunning) return;
    if(boss) return;

    let enemyType = Math.min(level,6);

    enemies.push({

        x:Math.random()*(canvas.width-70),
        y:-100,

        w:70,
        h:70,

        type:enemyType,

        speed:3 + level*0.6,

        health:2 + level*2,

        shootTimer:0
    });
}

setInterval(spawnEnemy,650);

/* MEDKIT */

function spawnMedkit(){

    if(!gameRunning) return;

    medkits.push({

        x:Math.random()*(canvas.width-40),
        y:-40,

        size:35,
        speed:2
    });
}

setInterval(spawnMedkit,12000);

/* BOSS */

function spawnBoss(){

    boss={

        x:canvas.width/2-170,
        y:-250,

        w:340,
        h:180,

        health:120 + level*40,
        maxHealth:120 + level*40,

        direction:1,
        shootTimer:0
    };
}

/* PRÓXIMO NÍVEL */

function nextLevel(){

    level++;

    levelText.innerText=level;

    updateShip();

    score=0;
    scoreText.innerText=score;

    boss=null;

    enemies.length=0;
    bullets.length=0;
    enemyBullets.length=0;

    health=maxHealth;

    updateHealth();
}

/* ESTRELAS */

function drawStars(){

    ctx.fillStyle="white";

    stars.forEach(star=>{

        star.y+=star.speed;

        if(star.y>canvas.height){

            star.y=0;
            star.x=Math.random()*canvas.width;
        }

        ctx.beginPath();

        ctx.arc(
            star.x,
            star.y,
            star.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    });
}

/* PLAYER */

function drawPlayer(){

    ctx.save();

    ctx.translate(player.x,player.y);

    let scale = 1 + (player.weaponLevel*0.08);

    ctx.scale(scale,scale);

    ctx.shadowColor="#00e5ff";
    ctx.shadowBlur=35;

    let gradient=ctx.createLinearGradient(0,-40,0,40);

    const shipColors = [
        "#00aaff",
        "#0044ff",
        "#ff00ff",
        "#ff3300",
        "#00ff88",
        "#ffee00"
    ];

    gradient.addColorStop(0,"white");
    gradient.addColorStop(1,shipColors[player.weaponLevel-1]);

    ctx.fillStyle=gradient;

    ctx.beginPath();

    ctx.moveTo(0,-45);
    ctx.lineTo(-40,25);
    ctx.lineTo(-12,10);
    ctx.lineTo(0,20);
    ctx.lineTo(12,10);
    ctx.lineTo(40,25);

    ctx.closePath();

    ctx.fill();

    ctx.fillStyle="white";

    ctx.beginPath();
    ctx.ellipse(0,-5,10,18,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

/* BULLETS */

function drawBullets(){

    bullets.forEach((bullet,index)=>{

        bullet.y-=bullet.speed;

        ctx.shadowColor="cyan";
        ctx.shadowBlur=20;

        ctx.fillStyle="#00ffff";

        ctx.fillRect(
            bullet.x,
            bullet.y,
            bullet.w,
            bullet.h
        );

        ctx.shadowBlur=0;

        if(bullet.y<-50){

            bullets.splice(index,1);
        }
    });
}

/* ENEMIES */

function drawEnemies(){

    enemies.forEach((enemy,eIndex)=>{

        enemy.y += enemy.speed;

        ctx.save();

        /* NÍVEL 1 */

        if(enemy.type === 1){

            ctx.shadowColor = "red";
            ctx.shadowBlur = 25;

            ctx.fillStyle = "#550000";

            ctx.beginPath();

            ctx.moveTo(enemy.x + enemy.w/2, enemy.y - 10);
            ctx.lineTo(enemy.x + enemy.w, enemy.y + 20);
            ctx.lineTo(enemy.x + enemy.w - 10, enemy.y + enemy.h);
            ctx.lineTo(enemy.x + 10, enemy.y + enemy.h);
            ctx.lineTo(enemy.x, enemy.y + 20);

            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "red";

            ctx.beginPath();
            ctx.arc(enemy.x+20, enemy.y+30, 6, 0, Math.PI*2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(enemy.x+50, enemy.y+30, 6, 0, Math.PI*2);
            ctx.fill();
        }

        /* NÍVEL 2 */

        else if(enemy.type === 2){

            ctx.shadowColor = "orange";
            ctx.shadowBlur = 30;

            ctx.fillStyle = "#aa3300";

            ctx.fillRect(
                enemy.x,
                enemy.y,
                enemy.w,
                enemy.h
            );

            ctx.fillStyle = "yellow";

            for(let i=0;i<5;i++){

                ctx.beginPath();

                ctx.arc(
                    enemy.x + 10 + i*12,
                    enemy.y + 20,
                    4,
                    0,
                    Math.PI*2
                );

                ctx.fill();
            }
        }

        /* NÍVEL 3 */

        else if(enemy.type === 3){

            ctx.shadowColor = "purple";
            ctx.shadowBlur = 35;

            ctx.fillStyle = "#440088";

            ctx.beginPath();

            ctx.arc(
                enemy.x+35,
                enemy.y+35,
                35,
                0,
                Math.PI*2
            );

            ctx.fill();

            ctx.fillStyle = "white";

            ctx.beginPath();

            ctx.arc(enemy.x+25,enemy.y+28,5,0,Math.PI*2);
            ctx.arc(enemy.x+45,enemy.y+28,5,0,Math.PI*2);

            ctx.fill();
        }

        /* NÍVEL 4 */

        else if(enemy.type === 4){

            ctx.shadowColor = "lime";
            ctx.shadowBlur = 40;

            ctx.fillStyle = "#00aa55";

            ctx.beginPath();

            ctx.moveTo(enemy.x+35,enemy.y);
            ctx.lineTo(enemy.x+70,enemy.y+35);
            ctx.lineTo(enemy.x+35,enemy.y+70);
            ctx.lineTo(enemy.x,enemy.y+35);

            ctx.closePath();

            ctx.fill();

            ctx.fillStyle = "black";

            ctx.fillRect(
                enemy.x+20,
                enemy.y+25,
                30,
                15
            );
        }

        /* NÍVEL 5 */

        else if(enemy.type === 5){

            ctx.shadowColor = "cyan";
            ctx.shadowBlur = 45;

            ctx.fillStyle = "#0088aa";

            ctx.beginPath();

            ctx.moveTo(enemy.x+35,enemy.y-10);
            ctx.lineTo(enemy.x+70,enemy.y+70);
            ctx.lineTo(enemy.x,enemy.y+70);

            ctx.closePath();

            ctx.fill();

            ctx.fillStyle = "white";

            ctx.beginPath();

            ctx.arc(enemy.x+35,enemy.y+35,10,0,Math.PI*2);

            ctx.fill();
        }

        /* NÍVEL 6+ */

        else{

            ctx.shadowColor = "white";
            ctx.shadowBlur = 50;

            ctx.fillStyle = "#dddddd";

            ctx.beginPath();

            ctx.arc(
                enemy.x+35,
                enemy.y+35,
                38,
                0,
                Math.PI*2
            );

            ctx.fill();

            ctx.fillStyle = "red";

            ctx.beginPath();

            ctx.arc(enemy.x+20,enemy.y+25,8,0,Math.PI*2);
            ctx.arc(enemy.x+50,enemy.y+25,8,0,Math.PI*2);

            ctx.fill();

            ctx.fillStyle = "black";

            ctx.fillRect(
                enemy.x+20,
                enemy.y+48,
                30,
                6
            );
        }

        ctx.restore();

        /* TIROS */

        enemy.shootTimer++;

        if(enemy.shootTimer > Math.max(25,90-level*8)){

            enemy.shootTimer = 0;

            enemyBullets.push({

                x: enemy.x + enemy.w/2 - 3,
                y: enemy.y + enemy.h,

                w: 6,
                h: 18,

                speed: 6 + level*0.8
            });
        }

        /* COLISÃO BALAS */

        bullets.forEach((bullet,bIndex)=>{

            if(
                bullet.x < enemy.x + enemy.w &&
                bullet.x + bullet.w > enemy.x &&
                bullet.y < enemy.y + enemy.h &&
                bullet.y + bullet.h > enemy.y
            ){

                bullets.splice(bIndex,1);

                enemy.health--;

                if(enemy.health <= 0){

                    enemies.splice(eIndex,1);

                    score += 15 + level*2;

                    scoreText.innerText = score;
                }
            }
        });

        /* PASSOU DA TELA */

        if(enemy.y > canvas.height){

            enemies.splice(eIndex,1);

            score -= 5;

            if(score < 0){
                score = 0;
            }

            scoreText.innerText = score;
        }

        /* COLISÃO PLAYER */

        if(
            player.x-25 < enemy.x + enemy.w &&
            player.x+25 > enemy.x &&
            player.y-25 < enemy.y + enemy.h &&
            player.y+25 > enemy.y
        ){

            enemies.splice(eIndex,1);

            health -= 15 + level;

            updateHealth();

            if(health <= 0){
                endGame();
            }
        }
    });
}

/* BOSS */

function drawBoss(){

    if(!boss) return;

    if(boss.y<40){
        boss.y+=1.5;
    }

    boss.x+=4*boss.direction;

    if(
        boss.x<0 ||
        boss.x+boss.w>canvas.width
    ){
        boss.direction*=-1;
    }

    ctx.shadowColor="red";
    ctx.shadowBlur=60;

    ctx.fillStyle="#770000";

    ctx.fillRect(
        boss.x,
        boss.y,
        boss.w,
        boss.h
    );

    ctx.fillStyle="white";

    ctx.beginPath();

    ctx.arc(
        boss.x+boss.w/2,
        boss.y+boss.h/2,
        28,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="#222";

    ctx.fillRect(
        boss.x,
        boss.y-30,
        boss.w,
        20
    );

    ctx.fillStyle="red";

    ctx.fillRect(
        boss.x,
        boss.y-30,
        boss.w*(boss.health/boss.maxHealth),
        20
    );

    boss.shootTimer++;

    if(boss.shootTimer>Math.max(8,25-level)){

        boss.shootTimer=0;

        enemyBullets.push({

            x:boss.x+boss.w/2-6,
            y:boss.y+boss.h,

            w:12,
            h:30,

            speed:8+level
        });
    }

    bullets.forEach((bullet,bIndex)=>{

        if(
            bullet.x<boss.x+boss.w &&
            bullet.x+bullet.w>boss.x &&
            bullet.y<boss.y+boss.h &&
            bullet.y+bullet.h>boss.y
        ){

            bullets.splice(bIndex,1);

            boss.health--;

            if(boss.health<=0){

                nextLevel();
            }
        }
    });
}

/* TIROS ENEMY */

function drawEnemyBullets(){

    enemyBullets.forEach((bullet,index)=>{

        bullet.y+=bullet.speed;

        ctx.fillStyle="red";

        ctx.fillRect(
            bullet.x,
            bullet.y,
            bullet.w,
            bullet.h
        );

        if(bullet.y>canvas.height){

            enemyBullets.splice(index,1);
        }

        if(
            player.x-25<bullet.x+bullet.w &&
            player.x+25>bullet.x &&
            player.y-25<bullet.y+bullet.h &&
            player.y+25>bullet.y
        ){

            enemyBullets.splice(index,1);

            health-=10 + level;

            updateHealth();

            if(health<=0){
                endGame();
            }
        }
    });
}

/* MEDKIT */

function drawMedkits(){

    medkits.forEach((medkit,index)=>{

        medkit.y+=medkit.speed;

        ctx.fillStyle="white";

        ctx.fillRect(
            medkit.x,
            medkit.y,
            medkit.size,
            medkit.size
        );

        ctx.fillStyle="red";

        ctx.fillRect(
            medkit.x+12,
            medkit.y+5,
            10,
            25
        );

        ctx.fillRect(
            medkit.x+5,
            medkit.y+12,
            25,
            10
        );

        if(medkit.y>canvas.height){

            medkits.splice(index,1);
        }

        if(
            player.x-20<medkit.x+medkit.size &&
            player.x+20>medkit.x &&
            player.y-20<medkit.y+medkit.size &&
            player.y+20>medkit.y
        ){

            medkits.splice(index,1);

            health+=30;

            if(health>maxHealth){
                health=maxHealth;
            }

            updateHealth();
        }
    });
}

/* MOVIMENTO */

function updatePlayer(){

    if(keys["a"] || keys["ArrowLeft"]){
        player.x-=player.speed;
    }

    if(keys["d"] || keys["ArrowRight"]){
        player.x+=player.speed;
    }

    if(keys["w"] || keys["ArrowUp"]){
        player.y-=player.speed;
    }

    if(keys["s"] || keys["ArrowDown"]){
        player.y+=player.speed;
    }

    if(player.x<30) player.x=30;

    if(player.x>canvas.width-30)
        player.x=canvas.width-30;

    if(player.y<30) player.y=30;

    if(player.y>canvas.height-60)
        player.y=canvas.height-60;
}

/* GAME OVER */

function endGame(){

    gameRunning=false;

    gameOverScreen.style.display="flex";

    finalScore.innerText=
    "Você chegou ao nível "+level;
}

/* RESTART */

function restartGame(){
    location.reload();
}

/* LOOP */

function gameLoop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();

    if(gameRunning){

        if(score>=350 && boss===null){

            spawnBoss();

            enemies.length=0;
        }

        updatePlayer();

        drawBullets();

        drawEnemies();

        drawBoss();

        drawEnemyBullets();

        drawMedkits();

        drawPlayer();
    }

    requestAnimationFrame(gameLoop);
}

updateShip();
updateHealth();
gameLoop();

window.addEventListener("resize",()=>{

    canvas.width=innerWidth;
    canvas.height=innerHeight;
});

</script>

</body>
</html>
